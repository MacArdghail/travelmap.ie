name: Update Travel Advice Data

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Scrape travel advice
        run: |
          python travel_advice.py > frontend/public/travel_advice.json

      - name: Archive daily snapshot
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          mkdir -p frontend/public/history
          cp frontend/public/travel_advice.json frontend/public/history/${DATE}.json

      - name: Update metadata with last updated time
        run: |
          echo "{\"lastUpdated\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > frontend/public/metadata.json

      - name: Commit changes
        run: |
          git add .
          git diff --cached --quiet || (
            git config user.name "github-actions[bot]" &&
            git config user.email "github-actions[bot]@users.noreply.github.com" &&
            git commit -m "Update travel advisories - $(date -u +"%Y-%m-%d")" &&
            git push
          )